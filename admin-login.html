<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Luxe Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            300: '#f9a8d4',
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                            700: '#be185d',
                            800: '#9d174d',
                            900: '#831843',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-primary-500 to-pink-600 min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl max-w-md w-full p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center space-x-2 mb-4">
                <i class="fas fa-gem text-primary-500 text-4xl"></i>
                <span
                    class="text-3xl font-display font-bold bg-gradient-to-r from-primary-500 to-pink-600 bg-clip-text text-transparent">Luxe
                    Beauty</span>
            </div>
            <h1 class="text-2xl font-display font-bold text-gray-900 dark:text-white mb-2">Admin Dashboard</h1>
            <p class="text-gray-600 dark:text-gray-400">Sign in to manage your store</p>
        </div>

        <!-- Login Form -->
        <form id="adminLoginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">
                    <i class="fas fa-envelope mr-2 text-primary-500"></i>Email Address
                </label>
                <input type="email" id="adminEmail" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition"
                    placeholder="admin@luxebeauty.com">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">
                    <i class="fas fa-lock mr-2 text-primary-500"></i>Password
                </label>
                <div class="relative">
                    <input type="password" id="adminPassword" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition"
                        placeholder="Enter your password">
                    <button type="button" onclick="togglePassword()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary-500">
                        <i id="passwordIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage"
                class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText">Invalid credentials</span>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full bg-gradient-to-r from-primary-500 to-pink-600 hover:from-primary-600 hover:to-pink-700 text-white py-4 rounded-lg font-semibold transition transform hover:scale-105 shadow-lg">
                <i class="fas fa-sign-in-alt mr-2"></i>Sign In to Dashboard
            </button>
        </form>

        <!-- Back to Site -->
        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-gray-600 dark:text-gray-400 hover:text-primary-500 transition">
                <i class="fas fa-arrow-left mr-2"></i>Back to Website
            </a>
        </div>

        <!-- Admin Info (for demo) -->
        <!-- <div class="mt-8 p-4 bg-gray-50 dark:bg-gray-700 rounded-lg text-xs text-gray-600 dark:text-gray-400">
            <p class="font-semibold mb-2"><i class="fas fa-info-circle mr-2 text-primary-500"></i>Admin Access:</p>
            <p>Email: aemade2016@gmail.com</p>
            <p>Password: admin123</p>
        </div> -->
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            var passwordInput = document.getElementById('adminPassword');
            var passwordIcon = document.getElementById('passwordIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        }

        // Show error message
        function showError(message) {
            var errorDiv = document.getElementById('errorMessage');
            var errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');

            setTimeout(function () {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        // Admin login form handler
        document.getElementById('adminLoginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var email = document.getElementById('adminEmail').value.trim();
            var password = document.getElementById('adminPassword').value;

            // Hardcoded admin credentials
            var ADMIN_EMAIL = 'aemade2016@gmail.com';
            var ADMIN_PASSWORD = 'admin123'; // In production, use proper hashing

            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                // Set admin session
                localStorage.setItem('luxe_isAdmin', 'true');
                localStorage.setItem('luxe_adminEmail', email);
                localStorage.setItem('luxe_adminLoginTime', new Date().toISOString());

                // Redirect to dashboard
                window.location.href = 'admin-dashboard.html';
            } else {
                showError('Invalid email or password. Please try again.');
            }
        });

        // Check if already logged in
        if (localStorage.getItem('luxe_isAdmin') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>

</html>
